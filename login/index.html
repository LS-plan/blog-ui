<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问博客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --err: #f85149; --radius: 10px;
    }
    body {
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(380px, calc(100vw - 32px));
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px 32px 28px;
    }
    .lock-icon { display: block; margin: 0 auto 20px; color: var(--muted); opacity: .6; }
    h1 { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .sub { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 24px; }
    input {
      width: 100%; padding: 10px 14px; font: inherit; font-size: .95rem;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; margin-top: 12px; padding: 10px; font: inherit; font-size: .95rem;
      font-weight: 600; background: var(--accent); color: #0d1117;
      border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .err { min-height: 1.4em; margin-top: 10px; font-size: .82rem; color: var(--err); text-align: center; }
    .footer { margin-top: 28px; text-align: center; font-size: .78rem; color: var(--muted); }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40"
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <h1>nobodyls · 博客</h1>
    <p class="sub">输入访问密码继续阅读</p>
    <form id="form">
      <input id="pw" type="password" inputmode="numeric"
        autocomplete="current-password" placeholder="访问密码" autofocus>
      <button id="btn" type="submit">进入</button>
      <p class="err" id="err"></p>
    </form>
    <p class="footer"><a href="/admin/">管理员</a></p>
  </div>

  <script>
    var API = "https://api.nobodyls.cn";
    var form = document.getElementById("form");
    var pw   = document.getElementById("pw");
    var btn  = document.getElementById("btn");
    var err  = document.getElementById("err");

    function next() {
      var p = new URLSearchParams(location.search).get("next");
      return (p && p.startsWith("/")) ? p : "/";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "验证中…";
      try {
        var resp = await fetch(API + "/blog/auth/site-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ password: pw.value }),
        });
        if (resp.ok) {
          location.href = next();
        } else {
          err.textContent = "密码不正确";
          pw.select();
        }
      } catch (e2) {
        err.textContent = "请求失败，请稍后重试";
      } finally {
        btn.disabled = false;
        btn.textContent = "进入";
      }
    });
  </script>
</body>
</html>
